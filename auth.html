<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X - تسجيل الدخول</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: #000;
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo svg {
            width: 50px;
            height: 50px;
            fill: #fff;
        }

        .logo h1 {
            font-size: 48px;
            color: #e1e8ed;
            margin-top: 20px;
        }

        .logo p {
            color: #71767b;
            font-size: 18px;
            margin-top: 10px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid #2f3336;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            cursor: pointer;
            color: #71767b;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.2s;
            position: relative;
        }

        .tab.active {
            color: #1d9bf0;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 4px;
            background: #1d9bf0;
            border-radius: 4px;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px;
            background: #000;
            border: 1px solid #2f3336;
            border-radius: 8px;
            color: #e1e8ed;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1d9bf0;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #71767b;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #1d9bf0;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }

        .auth-btn:hover {
            background: #1a8cd8;
        }

        .auth-btn.white {
            background: #fff;
            color: #000;
        }

        .auth-btn.white:hover {
            background: #e6e6e6;
        }

        .auth-btn.outline {
            background: transparent;
            border: 1px solid #536471;
            color: #1d9bf0;
        }

        .message {
            color: #f4212e;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        .message.success {
            color: #00ba7c;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #71767b;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2f3336;
        }

        .divider span {
            padding: 0 16px;
        }

        .avatar-upload {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1d9bf0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            border: 2px solid #2f3336;
        }

        .avatar-upload span {
            color: #1d9bf0;
            cursor: pointer;
        }

        .forgot-link {
            color: #1d9bf0;
            text-decoration: none;
            font-size: 14px;
        }

        .signup-text {
            color: #71767b;
            text-align: center;
            margin-top: 40px;
            font-size: 14px;
        }

        .signup-text a {
            color: #1d9bf0;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <svg viewBox="0 0 24 24" width="40" height="40">
                <path fill="#fff" d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            <h1>تسجيل الدخول إلى X</h1>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">تسجيل الدخول</div>
            <div class="tab" onclick="switchTab('register')">إنشاء حساب</div>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <div id="loginForm" class="auth-form active">
            <button class="auth-btn white" onclick="loginWithGoogle()">
                <i class="fab fa-google"></i> تسجيل الدخول بحساب Google
            </button>
            
            <div class="divider">
                <span>أو</span>
            </div>
            
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
            </div>
            <button class="auth-btn" onclick="login()">تسجيل الدخول</button>
            <div style="text-align: center; margin-top: 16px;">
                <a href="#" class="forgot-link" onclick="resetPassword()">نسيت كلمة المرور؟</a>
            </div>
            <div class="signup-text">
                ليس لديك حساب؟ <a href="#" onclick="switchTab('register')">إنشاء حساب</a>
            </div>
        </div>

        <!-- نموذج التسجيل -->
        <div id="registerForm" class="auth-form">
            <div class="avatar-upload">
                <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()">
                    <i class="fas fa-camera"></i>
                </div>
                <span onclick="document.getElementById('avatarInput').click()">إضافة صورة شخصية</span>
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
            </div>
            
            <div class="form-group">
                <input type="text" id="registerName" placeholder="الاسم">
            </div>
            <div class="form-group">
                <input type="text" id="registerUsername" placeholder="اسم المستخدم">
            </div>
            <div class="form-group">
                <input type="email" id="registerEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="form-group">
                <textarea id="registerBio" placeholder="النبذة التعريفية (اختياري)" rows="2"></textarea>
            </div>
            <div class="form-group">
                <input type="password" id="registerPassword" placeholder="كلمة المرور">
            </div>
            <div class="form-group">
                <input type="password" id="registerConfirmPassword" placeholder="تأكيد كلمة المرور">
            </div>
            <button class="auth-btn" onclick="register()">إنشاء حساب</button>
            <div class="signup-text">
                لديك حساب بالفعل؟ <a href="#" onclick="switchTab('login')">تسجيل الدخول</a>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <script src="firebase-config.js"></script>
    
    <script>
        let currentTab = 'login';
        let selectedAvatarFile = null;
        let avatarBase64 = null;

        document.getElementById('avatarInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                selectedAvatarFile = file;
                const reader = new FileReader();
                reader.onload = function(event) {
                    avatarBase64 = event.target.result;
                    document.getElementById('avatarPreview').style.backgroundImage = `url(${avatarBase64})`;
                    document.getElementById('avatarPreview').innerHTML = '';
                };
                reader.readAsDataURL(file);
            }
        });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            document.getElementById('message').textContent = '';
            document.getElementById('message').className = 'message';
        }

        function showMessage(text, isError = true) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${isError ? '' : 'success'}`;
        }

        async function uploadAvatar(userId) {
            if (!selectedAvatarFile) return null;
            
            const formData = new FormData();
            formData.append('file', selectedAvatarFile);
            formData.append('upload_preset', UPLOAD_PRESET);
            
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                return data.secure_url;
            } catch (error) {
                return null;
            }
        }

        async function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                await db.ref('users/' + userCredential.user.uid).update({
                    lastLogin: Date.now(),
                    isOnline: true
                });
                showMessage('تم تسجيل الدخول بنجاح!', false);
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                showMessage('خطأ: ' + (error.code === 'auth/user-not-found' ? 'الحساب غير موجود' : error.code === 'auth/wrong-password' ? 'كلمة المرور غير صحيحة' : error.message));
            }
        }

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                const userRef = db.ref('users/' + user.uid);
                const snapshot = await userRef.once('value');
                
                if (!snapshot.exists()) {
                    await userRef.set({
                        name: user.displayName || '',
                        username: (user.email || '').split('@')[0],
                        email: user.email || '',
                        bio: '',
                        avatar: user.photoURL || '',
                        coverImage: '',
                        location: '',
                        website: '',
                        createdAt: Date.now(),
                        isVerified: false,
                        isBanned: false,
                        followers: {},
                        following: {},
                        isAdmin: user.email === ADMIN_EMAIL,
                        isOnline: true,
                        followersCount: 0,
                        followingCount: 0,
                        postsCount: 0
                    });
                } else {
                    await userRef.update({ isOnline: true });
                }
                
                showMessage('تم تسجيل الدخول بنجاح!', false);
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                showMessage('خطأ في تسجيل الدخول: ' + error.message);
            }
        }

        async function register() {
            const name = document.getElementById('registerName').value.trim();
            const username = document.getElementById('registerUsername').value.trim().toLowerCase();
            const email = document.getElementById('registerEmail').value.trim();
            const bio = document.getElementById('registerBio').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('registerConfirmPassword').value;

            if (!name || !username || !email || !password) {
                showMessage('الرجاء ملء جميع الحقول المطلوبة');
                return;
            }

            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showMessage('اسم المستخدم يجب أن يحتوي على أحرف إنجليزية وأرقام و_ فقط');
                return;
            }

            if (password !== confirm) {
                showMessage('كلمات المرور غير متطابقة');
                return;
            }

            if (password.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            const usernameSnapshot = await db.ref('users').orderByChild('username').equalTo(username).once('value');
            if (usernameSnapshot.exists()) {
                showMessage('اسم المستخدم مستخدم بالفعل');
                return;
            }

            try {
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;

                let avatarUrl = '';
                if (selectedAvatarFile) {
                    avatarUrl = await uploadAvatar(user.uid);
                }

                await db.ref('users/' + user.uid).set({
                    name: name,
                    username: username,
                    email: email,
                    bio: bio,
                    avatar: avatarUrl || '',
                    coverImage: '',
                    location: '',
                    website: '',
                    createdAt: Date.now(),
                    isVerified: false,
                    isBanned: false,
                    followers: {},
                    following: {},
                    bookmarks: {},
                    isAdmin: email === ADMIN_EMAIL,
                    settings: { soundEffects: true, darkMode: false, notifications: true },
                    isOnline: true,
                    lastSeen: Date.now(),
                    postsCount: 0,
                    followersCount: 0,
                    followingCount: 0
                });

                await user.updateProfile({
                    displayName: name,
                    photoURL: avatarUrl
                });

                showMessage('تم إنشاء الحساب بنجاح!', false);
                setTimeout(() => window.location.href = 'index.html', 1000);
            } catch (error) {
                showMessage('خطأ: ' + (error.code === 'auth/email-already-in-use' ? 'البريد الإلكتروني مستخدم بالفعل' : error.message));
            }
        }

        async function resetPassword() {
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) {
                showMessage('الرجاء إدخال البريد الإلكتروني أولاً');
                return;
            }
            try {
                await auth.sendPasswordResetEmail(email);
                showMessage('تم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني', false);
            } catch (error) {
                showMessage('خطأ: ' + error.message);
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'index.html';
        });
    </script>
</body>
</html>
