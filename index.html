<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة X الأسطورية</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <!-- Cloudinary -->
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        :root {
            --bg-primary: #f0f2f5;
            --bg-secondary: white;
            --text-primary: #0f1419;
            --text-secondary: #536471;
            --border-color: #e1e8ed;
            --accent-blue: #1da1f2;
            --accent-red: #e0245e;
            --accent-green: #00ba7c;
            --shadow: rgba(0,0,0,0.1);
        }

        body.dark-mode {
            --bg-primary: #15202b;
            --bg-secondary: #1e2732;
            --text-primary: #f7f9fa;
            --text-secondary: #8899a6;
            --border-color: #38444d;
            --shadow: rgba(255,255,255,0.05);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        /* شريط التنقل */
        .navbar {
            background: var(--bg-secondary);
            padding: 12px 24px;
            box-shadow: 0 2px 4px var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            transition: all 0.3s;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent-blue);
        }

        .search-container {
            position: relative;
            width: 350px;
        }

        .search-input {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: none;
            border-radius: 30px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
        }

        .search-input:focus {
            outline: 2px solid var(--accent-blue);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .badge-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent-red);
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .online-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-green);
            border: 2px solid var(--bg-secondary);
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .logout-btn {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }

        /* تخطيط رئيسي */
        .container {
            max-width: 1200px;
            margin: 80px auto 20px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 250px 1fr 300px;
            gap: 20px;
        }

        /* القائمة الجانبية */
        .sidebar {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 5px;
        }

        .menu-item:hover {
            background: var(--bg-primary);
        }

        .menu-item.active {
            color: var(--accent-blue);
            font-weight: bold;
        }

        .shortcuts-help {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .shortcuts-help kbd {
            background: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        /* منطقة التغريدات */
        .feed {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
        }

        .post-creator {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .post-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 18px;
            padding: 15px;
            background: var(--bg-primary);
            border-radius: 16px;
            margin-bottom: 15px;
            resize: none;
            color: var(--text-primary);
        }

        .char-counter {
            text-align: left;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .char-counter.warning {
            color: #ffad1f;
        }

        .char-counter.danger {
            color: var(--accent-red);
        }

        .post-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            cursor: pointer;
            font-size: 20px;
            padding: 5px 10px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: var(--bg-primary);
        }

        .recording-btn.recording {
            color: var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .post-submit {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            float: left;
            transition: all 0.3s;
        }

        .post-submit:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .post-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .image-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .preview-image {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            cursor: pointer;
        }

        .link-preview {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 10px;
            margin: 10px 0;
            display: flex;
            gap: 10px;
        }

        .link-preview img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
        }

        .audio-preview {
            margin: 10px 0;
            width: 100%;
        }

        /* Skeleton Loading */
        .skeleton-post {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 15px;
            margin-bottom: 10px;
        }

        .skeleton-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-primary) 50%, var(--border-color) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            float: right;
            margin-left: 10px;
        }

        .skeleton-line {
            height: 16px;
            background: linear-gradient(90deg, var(--border-color) 25%, var(--bg-primary) 50%, var(--border-color) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .skeleton-line.short {
            width: 60%;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* التغريدات */
        .post {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            transition: background 0.3s;
        }

        .post:hover {
            background: var(--bg-primary);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .post-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
        }

        .post-author {
            font-weight: bold;
        }

        .post-username {
            color: var(--text-secondary);
        }

        .post-content {
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .post-content a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .post-content .hashtag {
            color: var(--accent-blue);
        }

        .post-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }

        .post-image {
            width: 100%;
            border-radius: 16px;
            max-height: 300px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .post-image:hover {
            transform: scale(1.02);
        }

        .post-audio {
            width: 100%;
            margin: 10px 0;
        }

        .post-footer {
            display: flex;
            gap: 30px;
            color: var(--text-secondary);
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .post-action:hover {
            background: var(--bg-primary);
        }

        .post-action.liked {
            color: var(--accent-red);
        }

        .post-action.retweeted {
            color: var(--accent-green);
        }

        .post-action.bookmarked {
            color: var(--accent-blue);
        }

        .verified-badge {
            color: var(--accent-blue);
            margin-left: 5px;
        }

        /* الشريط الجانبي الأيمن */
        .right-sidebar {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .trending-section {
            margin-bottom: 20px;
        }

        .trending-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.3s;
        }

        .trending-item:hover {
            background: var(--bg-primary);
        }

        .trending-topic {
            font-weight: bold;
        }

        .trending-count {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .suggested-users {
            margin-top: 20px;
        }

        .suggested-user {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
        }

        .follow-btn {
            background: var(--text-primary);
            color: var(--bg-secondary);
            border: none;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .follow-btn.following {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        /* لوحة تحكم المدير */
        .admin-panel {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .admin-panel.visible {
            display: block;
        }

        .admin-section {
            margin-bottom: 20px;
        }

        .admin-section h3 {
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .user-management-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .ban-btn, .verify-btn, .delete-btn {
            padding: 5px 12px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            margin-left: 5px;
            transition: all 0.3s;
        }

        .ban-btn {
            background: var(--accent-red);
            color: white;
        }

        .verify-btn {
            background: var(--accent-blue);
            color: white;
        }

        .delete-btn {
            background: #ffad1f;
            color: white;
        }

        /* إشعارات Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 9999;
        }

        .toast {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 10px;
            box-shadow: 0 4px 12px var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }

        .toast.success {
            border-right: 4px solid var(--accent-green);
        }

        .toast.error {
            border-right: 4px solid var(--accent-red);
        }

        .toast.info {
            border-right: 4px solid var(--accent-blue);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        /* زر العودة للأعلى */
        .scroll-top-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent-blue);
            color: white;
            border: none;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 12px var(--shadow);
            transition: all 0.3s;
            z-index: 1000;
        }

        .scroll-top-btn:hover {
            transform: scale(1.1);
        }

        .scroll-top-btn.visible {
            display: flex;
        }

        /* نافذة عرض الصورة */
        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .image-modal.active {
            display: flex;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 16px;
        }

        .image-modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        /* زر تحميل المزيد */
        .load-more-btn {
            width: 100%;
            padding: 15px;
            background: var(--bg-primary);
            border: none;
            border-radius: 30px;
            color: var(--accent-blue);
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .load-more-btn:hover {
            background: var(--border-color);
        }

        /* استجابة للجوال */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .sidebar, .right-sidebar {
                display: none;
            }
            
            .search-container {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- شريط التنقل -->
    <div class="navbar">
        <div class="logo" onclick="location.reload()">𝕏</div>
        
        <div class="search-container">
            <input type="text" class="search-input" placeholder="ابحث في المنصة..." id="searchInput">
            <i class="fas fa-search search-icon"></i>
        </div>
        
        <div class="user-info">
            <div class="notification-badge" onclick="showNotifications()">
                <i class="far fa-bell" style="font-size: 24px; color: var(--text-primary);"></i>
                <span class="badge-count" id="notificationCount" style="display: none;">0</span>
            </div>
            
            <div style="position: relative;">
                <div class="user-avatar" id="userAvatar"></div>
                <span class="online-indicator" id="onlineIndicator"></span>
            </div>
            
            <span id="userDisplayName"></span>
            
            <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
            
            <button onclick="toggleTheme()" style="background: none; border: none; cursor: pointer; font-size: 20px;" title="تبديل الوضع الليلي">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="container">
        <!-- القائمة الجانبية -->
        <div class="sidebar">
            <div class="menu-item active" onclick="window.location.reload()">
                <i class="fas fa-home"></i>
                <span>الرئيسية</span>
            </div>
            <div class="menu-item" onclick="showBookmarks()">
                <i class="far fa-bookmark"></i>
                <span>المحفوظات</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-hashtag"></i>
                <span>استكشاف</span>
            </div>
            <div class="menu-item" onclick="showNotifications()">
                <i class="far fa-bell"></i>
                <span>الإشعارات</span>
            </div>
            <div class="menu-item" onclick="viewProfile()">
                <i class="far fa-user"></i>
                <span>الملف الشخصي</span>
            </div>
            <div class="menu-item" onclick="openSettings()">
                <i class="fas fa-cog"></i>
                <span>الإعدادات</span>
            </div>
            
            <div class="shortcuts-help">
                <strong>⌨️ اختصارات:</strong><br>
                <kbd>N</kbd> تغريدة جديدة<br>
                <kbd>/</kbd> بحث سريع<br>
                <kbd>Ctrl+Enter</kbd> إرسال<br>
                <kbd>Esc</kbd> إغلاق
            </div>
        </div>

        <!-- منطقة التغريدات -->
        <div class="feed">
            <!-- صندوق إنشاء تغريدة -->
            <div class="post-creator">
                <textarea class="post-input" id="postContent" placeholder="ماذا يحدث؟" maxlength="280"></textarea>
                <div class="char-counter" id="charCounter">0/280</div>
                
                <div class="image-preview" id="imagePreview"></div>
                <div id="linkPreviewContainer"></div>
                <audio class="audio-preview" id="audioPreview" controls style="display:none;"></audio>
                
                <div class="post-actions">
                    <button class="action-btn" onclick="document.getElementById('imageInput').click()" title="إضافة صورة">
                        <i class="far fa-image"></i>
                    </button>
                    <input type="file" id="imageInput" accept="image/*" multiple style="display:none;">
                    
                    <button class="action-btn recording-btn" id="recordBtn" onclick="toggleRecording()" title="تسجيل صوتي">
                        <i class="fas fa-microphone"></i>
                    </button>
                    
                    <button class="action-btn" onclick="showEmojiPicker()" title="إيموجي">
                        <i class="far fa-smile"></i>
                    </button>
                    
                    <button class="action-btn" onclick="createPoll()" title="استطلاع">
                        <i class="fas fa-chart-bar"></i>
                    </button>
                </div>
                
                <button class="post-submit" id="postSubmitBtn" onclick="createPost()">تغريد</button>
                <div style="clear: both;"></div>
            </div>

            <!-- قائمة التغريدات -->
            <div id="postsContainer"></div>
            
            <!-- زر تحميل المزيد -->
            <button class="load-more-btn" id="loadMoreBtn" onclick="loadMorePosts()" style="display: none;">
                تحميل المزيد من التغريدات
            </button>
        </div>

        <!-- الشريط الجانبي الأيمن -->
        <div class="right-sidebar">
            <!-- المواضيع الرائجة -->
            <div class="trending-section">
                <h3>المواضيع الرائجة</h3>
                <div id="trendingTopics"></div>
            </div>
            
            <h3>اقتراحات للمتابعة</h3>
            <div class="suggested-users" id="suggestedUsers"></div>
            
            <!-- لوحة تحكم المدير -->
            <div class="admin-panel" id="adminPanel">
                <h2>🎯 لوحة تحكم المدير</h2>
                
                <div class="admin-section">
                    <h3>إدارة المستخدمين</h3>
                    <div id="usersList"></div>
                </div>
                
                <div class="admin-section">
                    <h3>إدارة المحتوى</h3>
                    <div id="contentList"></div>
                </div>
                
                <div class="admin-section">
                    <h3>إحصائيات</h3>
                    <div id="statsPanel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- حاوية الإشعارات المنبثقة -->
    <div class="toast-container" id="toastContainer"></div>
    
    <!-- زر العودة للأعلى -->
    <button class="scroll-top-btn" id="scrollTopBtn" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i>
    </button>
    
    <!-- نافذة عرض الصورة -->
    <div class="image-modal" id="imageModal" onclick="closeImageModal()">
        <span class="image-modal-close">&times;</span>
